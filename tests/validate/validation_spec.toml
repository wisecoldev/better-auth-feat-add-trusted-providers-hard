stack_profile = "typescript-library"

[settings]
script_timeout_sec = 600
cc_timeout_sec = 1800

[settings.jest]
runner = "vitest"
config_dir = ""
test_parent = "packages/better-auth/src/oauth2"
command = "npx vitest run --reporter=verbose"

instructions = """
This task is the better-auth TypeScript library. Validation runs each
story by writing a vitest test file that drives the better-auth in-repo
OAuth account-linking flow and asserts on its observable outcome. The
"jest" driver below wraps vitest — the runner, output parsing, and
parameter injection are all handled for you.

## File names and locations

For each story you must create a file named `<story-id>.test.tsx` (or
`<story-id>.test.ts`) in the scripts directory the validator places you
in. The driver copies your file to:

  /repo/better-auth/packages/better-auth/src/oauth2/__validation__/<story-id>.test.tsx

and runs `npx vitest run --reporter=verbose <path> --testTimeout=...`
from the workspace root `/repo/better-auth/`.

Because your file lives 2 directories below `packages/better-auth/src/`,
relative imports look like:

  import { signJWT } from "../../crypto";
  import { getTestInstance } from "../../test-utils/test-instance";
  import { DEFAULT_SECRET } from "../../utils/constants";

These are pre-existing modules — do not invent new module names.

## Required test-file skeleton

ALWAYS use this skeleton — it embeds the parameter helper, the msw
lifecycle, and the case-naming convention the driver's parser
recognises. CRITICAL: keep `case $#` in `it.each` so per-case results
get reported correctly.

```ts
// @ts-nocheck
import type { GoogleProfile } from "@better-auth/core/social-providers";
import { HttpResponse, http } from "msw";
import { setupServer } from "msw/node";
import {
  afterAll,
  afterEach,
  beforeAll,
  describe,
  it,
  expect,
  vi,
} from "vitest";
import { signJWT } from "../../crypto";
import { getTestInstance } from "../../test-utils/test-instance";
import { DEFAULT_SECRET } from "../../utils/constants";

import { getTestCases } from "./validationParams";

const server = setupServer();
beforeAll(() => server.listen({ onUnhandledRequest: "bypass" }));
afterEach(() => server.resetHandlers());
afterAll(() => server.close());

describe("<story-id>", () => {
  const cases = getTestCases();
  it.each(cases)("case $#", async ({ inputs, expected }) => {
    // ... per-story body, see procedure ...
  });
});
```

## OAuth callback recipe (every story)

Inside the test body, every story drives the SAME OAuth callback flow
— the only thing that changes per story is the `trustedProviders`
configuration, the per-case inputs, and what you capture/assert.

The recipe (copied verbatim from the in-repo
`packages/better-auth/src/oauth2/link-account.test.ts:33-102`):

```ts
// 1. Build a fresh auth instance with the per-story trustedProviders.
const { auth, client, cookieSetter } = await getTestInstance({
  socialProviders: {
    google: { clientId: "test", clientSecret: "test", enabled: true },
  },
  emailAndPassword: { enabled: true },
  account: {
    accountLinking: {
      enabled: true,
      trustedProviders: <story-specific value>,
    },
  },
});
const ctx = await auth.$context;

// 2. Pre-create the user so the OAuth callback exercises the LINK
//    branch (not the new-user branch). The Kysely adapter ignores
//    user-supplied id fields — capture the autogenerated id from the
//    return value.
const created = await ctx.adapter.create({
  model: "user",
  data: {
    email: "<unique per case>",
    name: "Existing User",
    emailVerified: true,
    createdAt: new Date(),
    updatedAt: new Date(),
  },
});
const userId = created.id;

// 3. Stub the Google token-exchange endpoint via msw.
server.use(
  http.post("https://oauth2.googleapis.com/token", async () => {
    const profile: GoogleProfile = {
      email: "<same as the user above>",
      email_verified: false,             // unverified → trustedProviders gates
      name: "Test User",
      picture: "https://example.com/photo.jpg",
      sub: "<unique per case>",
      iat: 1234567890, exp: 1234567890,
      aud: "test", azp: "test", nbf: 1234567890,
      iss: "test", locale: "en", jti: "test",
      given_name: "Test", family_name: "User",
    };
    const idToken = await signJWT(profile, DEFAULT_SECRET);
    return HttpResponse.json({
      access_token: "test_access_token",
      refresh_token: "test_refresh_token",
      id_token: idToken,
    });
  }),
);

// 4. Drive client.signIn.social and capture the redirect URL state.
const oAuthHeaders = new Headers();
const signInRes = await client.signIn.social({
  provider: "google",
  callbackURL: <inputs.configured_callback_url ?? "/">,
  fetchOptions: { onSuccess: cookieSetter(oAuthHeaders) },
});
const state =
  new URL(signInRes.data!.url!).searchParams.get("state") || "";

// 5. Drive the actual OAuth callback. Capture the final redirect's
//    Location header via onError (every 302 surfaces as an error here
//    in the test client).
let redirectLocation = "";
await client.$fetch("/callback/google", {
  query: { state, code: "test_code" /* + per-story extras */ },
  method: "GET",
  headers: oAuthHeaders,
  onError(c: any) {
    redirectLocation = c.response.headers.get("location") || "";
  },
});

// 6. Read post-flow account rows for the user.
const accounts = await ctx.adapter.findMany({
  model: "account",
  where: [{ field: "userId", value: userId }],
});
const linkedAccountCount = accounts.filter(
  (a: any) => a.providerId === "google",
).length;
```

## Critical rules

- DO NOT modify any source under `/repo/better-auth/packages/`. The
  validator runs `git diff` after validation; ANY modification zeros
  the score. Only your test file under `__validation__/` is allowed.
- ALWAYS `// @ts-nocheck` at top of the test file.
- USE unique emails / subs per test case — getTestInstance gives each
  story a fresh in-memory SQLite, but cases inside one story share that
  database, so duplicate emails/subs across cases collide.
- USE `it.each(cases)("case $#", ...)` — the driver's parser keys off
  `case 0`, `case 1`, etc. to map results back to test cases.
- The repo's existing test pattern in
  `packages/better-auth/src/oauth2/link-account.test.ts` shows EVERY
  detail above in working form. When in doubt, mirror it.
"""


# =============================================================================
# Story 1: async resolver returning a list containing the provider allows
# unverified-email account linking. Cases vary by callback URL and the
# returned list (which still must contain "google").
# =============================================================================

[[story]]
id = "dynamic_resolver_allows_listed_provider"
driver = "jest"
description = """
When the OAuth account-linking allow-list is supplied as an async
function and the function returns a list containing the OAuth provider,
an unverified-email user from that provider is treated as trusted and
the account is linked. The OAuth callback follows through to the
configured callbackURL.
"""
procedure = """
Set up the OAuth callback recipe (see the spec instructions). For this
story configure:

  trustedProviders: async (_request) => inputs.resolver_returns

where `inputs.resolver_returns` is the per-case list. The Google OAuth
profile is unverified (`email_verified: false`).

Drive the flow with `callbackURL: inputs.configured_callback_url`,
capture `redirectLocation` and `linkedAccountCount`, then assert:

- EXPECTED: linkedAccountCount equals expected.linked_account_count
  (1 for the success case).
- EXPECTED: redirectLocation contains expected.redirect_substring
  (the configured callback URL).
- EXPECTED: redirectLocation does NOT contain "error=account_not_linked"
  (sanity check: the OAuth callback did not bail to the error redirect).

Use unique email/sub strings per case so cases don't collide on the
shared in-memory DB.
"""

[[story.test_case]]
[story.test_case.inputs]
resolver_returns = ["google"]
configured_callback_url = "/dashboard"
[story.test_case.expected]
linked_account_count = 1
redirect_substring = "/dashboard"

[[story.test_case]]
[story.test_case.inputs]
resolver_returns = ["google", "github"]
configured_callback_url = "/welcome-aboard"
[story.test_case.expected]
linked_account_count = 1
redirect_substring = "/welcome-aboard"


# =============================================================================
# Story 2: async resolver returning a list that does NOT contain the OAuth
# provider rejects unverified-email account linking. Proves the resolver's
# return value is actually evaluated for content (not just shape-accepted).
# =============================================================================

[[story]]
id = "dynamic_resolver_excludes_unlisted_provider"
driver = "jest"
description = """
When the dynamic resolver returns a list that does NOT contain the
OAuth provider, an unverified-email account-linking attempt for that
provider is rejected — the account row is never created.
"""
procedure = """
Set up the OAuth callback recipe (see the spec instructions). For this
story configure:

  trustedProviders: vi.fn(async (_request) => inputs.resolver_returns)

The Google OAuth profile is unverified. Drive the flow with
`callbackURL: "/"`, capture `linkedAccountCount`, and capture the size
of the list the resolver actually returned by reading the spy's last
return value:

  const last = (resolverSpy.mock.results.at(-1)?.value);
  const lastList = await last;
  const resolvedListSize = Array.isArray(lastList) ? lastList.length : -1;

Then assert:

- EXPECTED: linkedAccountCount equals expected.linked_account_count
  (0 — google is not in the resolver's output, so unverified-email
  linking is rejected).
- EXPECTED: resolvedListSize equals expected.resolved_list_size
  (proves the resolver was actually invoked with the input list).

Use unique email/sub strings per case.
"""

[[story.test_case]]
[story.test_case.inputs]
resolver_returns = []
[story.test_case.expected]
linked_account_count = 0
resolved_list_size = 0

[[story.test_case]]
[story.test_case.inputs]
resolver_returns = ["github", "facebook"]
[story.test_case.expected]
linked_account_count = 0
resolved_list_size = 2


# =============================================================================
# Story 3: async resolver receives the incoming Request and can use it for
# per-request trust decisions. Configure a resolver that branches on a
# query param of the incoming OAuth callback URL.
# =============================================================================

[[story]]
id = "dynamic_resolver_per_request_decision"
driver = "jest"
description = """
The dynamic resolver receives the incoming Request object on each
callback so the application can vary trust decisions per request.
With a single resolver implementation that derives the allow-list
from something on the incoming request (a header, a query parameter,
the URL path), two callbacks made with different request inputs
must produce different trust outcomes — one allowing the link, the
other rejecting it.
"""
procedure = """
Set up the OAuth callback recipe with the resolver below:

  trustedProviders: async (request) => {
    if (!request) return [];
    const url = new URL(request.url);
    return url.searchParams.get("tenant") === "alpha" ? ["google"] : [];
  }

The Google OAuth profile is unverified. Drive the flow with
`callbackURL: "/dashboard"`, but pass the per-case tenant as an extra
query parameter to the callback fetch:

  await client.$fetch("/callback/google", {
    query: { state, code: "test_code", tenant: inputs.tenant },
    method: "GET",
    headers: oAuthHeaders,
    onError(c) { redirectLocation = c.response.headers.get("location") || ""; },
  });

After the flow, capture both `redirectLocation` and
`linkedAccountCount`. Then assert:

- EXPECTED: linkedAccountCount equals expected.linked_account_count
  (1 when tenant matches the trusted value; 0 when it does not).
- EXPECTED: redirectLocation contains expected.redirect_substring
  (the configured callback URL when the link is allowed; the
  account-not-linked error redirect when it is rejected).

Use unique email/sub strings per case.
"""

[[story.test_case]]
[story.test_case.inputs]
tenant = "alpha"
[story.test_case.expected]
linked_account_count = 1
redirect_substring = "/dashboard"

[[story.test_case]]
[story.test_case.inputs]
tenant = "beta"
[story.test_case.expected]
linked_account_count = 0
redirect_substring = "error=account_not_linked"
